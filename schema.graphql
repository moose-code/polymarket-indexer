## ============================================================
## Phase 1A: Fee Module
## ============================================================

type FeeRefunded {
  id: ID!
  orderHash: String! @index
  tokenId: String! @index
  timestamp: BigInt!
  refundee: String! @index
  feeRefunded: BigInt!
  feeCharged: BigInt!
  negRisk: Boolean!
}

## ============================================================
## Phase 1B: Sports Oracle
## ============================================================

type Game {
  id: ID!
  ancillaryData: String!
  ordering: String!
  state: String! @index
  homeScore: BigInt!
  awayScore: BigInt!
}

type Market {
  id: ID!
  gameId: String! @index
  state: String! @index
  marketType: String!
  underdog: String!
  line: BigInt!
  payouts: [BigInt!]!
}

## ============================================================
## Phase 2A: Wallet
## ============================================================

type Wallet {
  id: ID!
  signer: String! @index
  type: String!
  balance: BigInt!
  lastTransfer: BigInt!
  createdAt: BigInt!
}

type GlobalUSDCBalance {
  id: ID!
  balance: BigInt!
}

## ============================================================
## Phase 2B: Orderbook
## ============================================================

type MarketData {
  id: ID!
  condition: String! @index
  outcomeIndex: BigInt
}

type OrderFilledEvent {
  id: ID!
  transactionHash: String!
  timestamp: BigInt! @index
  orderHash: String! @index
  maker: String! @index
  taker: String! @index
  makerAssetId: String!
  takerAssetId: String!
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
  fee: BigInt!
}

type OrdersMatchedEvent {
  id: ID!
  timestamp: BigInt! @index
  makerAssetID: BigInt!
  takerAssetID: BigInt!
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
}

type Orderbook {
  id: ID!
  tradesQuantity: BigInt!
  buysQuantity: BigInt!
  sellsQuantity: BigInt!
  collateralVolume: BigInt!
  scaledCollateralVolume: BigDecimal!
  collateralBuyVolume: BigInt!
  scaledCollateralBuyVolume: BigDecimal!
  collateralSellVolume: BigInt!
  scaledCollateralSellVolume: BigDecimal!
}

type OrdersMatchedGlobal {
  id: ID!
  tradesQuantity: BigInt!
  buysQuantity: BigInt!
  sellsQuantity: BigInt!
  collateralVolume: BigDecimal!
  scaledCollateralVolume: BigDecimal!
  collateralBuyVolume: BigDecimal!
  scaledCollateralBuyVolume: BigDecimal!
  collateralSellVolume: BigDecimal!
  scaledCollateralSellVolume: BigDecimal!
}

## ============================================================
## Phase 3A: Open Interest
## ============================================================

type Condition {
  id: ID!
}

type NegRiskEvent {
  id: ID!
  feeBps: BigInt!
  questionCount: BigInt!
}

type MarketOpenInterest {
  id: ID!
  amount: BigInt!
}

type GlobalOpenInterest {
  id: ID!
  amount: BigInt!
}

## ============================================================
## Phase 3B: Activity
## ============================================================

type Split {
  id: ID!
  timestamp: BigInt! @index
  stakeholder: String! @index
  condition: String! @index
  amount: BigInt!
}

type Merge {
  id: ID!
  timestamp: BigInt! @index
  stakeholder: String! @index
  condition: String! @index
  amount: BigInt!
}

type Redemption {
  id: ID!
  timestamp: BigInt! @index
  redeemer: String! @index
  condition: String! @index
  indexSets: [BigInt!]!
  payout: BigInt!
}

type NegRiskConversion {
  id: ID!
  timestamp: BigInt! @index
  stakeholder: String! @index
  negRiskMarketId: String! @index
  amount: BigInt!
  indexSet: BigInt!
  questionCount: BigInt!
}

type Position {
  id: ID!
  condition: String! @index
  outcomeIndex: BigInt!
}

type FixedProductMarketMaker {
  id: ID!
}
