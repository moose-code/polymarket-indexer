## ============================================================
## Phase 4B: FPMM
## ============================================================

type Collateral {
  id: ID!
  name: String!
  symbol: String!
  decimals: BigInt!
}

enum TransactionType {
  Buy
  Sell
}

type FpmmTransaction {
  id: ID!
  type: TransactionType!
  timestamp: BigInt! @index
  market_id: String! @index
  user: String! @index
  tradeAmount: BigInt!
  feeAmount: BigInt!
  outcomeIndex: BigInt!
  outcomeTokensAmount: BigInt!
}

type FpmmFundingAddition {
  id: ID!
  timestamp: BigInt! @index
  fpmm_id: String! @index
  funder: String! @index
  amountsAdded: [BigInt!]!
  amountsRefunded: [BigInt!]!
  sharesMinted: BigInt!
}

type FpmmFundingRemoval {
  id: ID!
  timestamp: BigInt! @index
  fpmm_id: String! @index
  funder: String! @index
  amountsRemoved: [BigInt!]!
  collateralRemoved: BigInt!
  sharesBurnt: BigInt!
}

type FpmmPoolMembership {
  id: ID!
  pool_id: String! @index
  funder: String! @index
  amount: BigInt!
}

