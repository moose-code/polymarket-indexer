## ============================================================
## Phase 1A: Fee Module
## ============================================================

type FeeRefunded {
  id: ID!
  orderHash: String! @index
  tokenId: String! @index
  timestamp: BigInt!
  refundee: String! @index
  feeRefunded: BigInt!
  feeCharged: BigInt!
  negRisk: Boolean!
}

## ============================================================
## Phase 1B: Sports Oracle
## ============================================================

type Game {
  id: ID!
  ancillaryData: String!
  ordering: String!
  state: String! @index
  homeScore: BigInt!
  awayScore: BigInt!
}

type Market {
  id: ID!
  gameId: String! @index
  conditionId: String! @index
  state: String! @index
  marketType: String!
  underdog: String!
  line: BigInt!
  payouts: [BigInt!]!
}

## ============================================================
## Phase 2A: Wallet
## ============================================================

type Wallet {
  id: ID!
  signer: String! @index
  type: String!
  balance: BigInt!
  lastTransfer: BigInt!
  createdAt: BigInt!
}

type GlobalUSDCBalance {
  id: ID!
  balance: BigInt!
}

## ============================================================
## Phase 2B: Orderbook
## ============================================================

type MarketData {
  id: ID!
  condition: String! @index
  outcomeIndex: BigInt
}

type OrderFilledEvent {
  id: ID!
  transactionHash: String!
  timestamp: BigInt! @index
  orderHash: String! @index
  maker: String! @index
  taker: String! @index
  makerAssetId: String!
  takerAssetId: String!
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
